version: "3.8"

# Chạy Neo4j + tự mount thư mục csv/ làm import directory
# Usage:
#   1. python3 convert_to_csv.py          # tạo csv/
#   2. docker compose up -d               # khởi động Neo4j
#   3. Mở http://localhost:7474           # Neo4j Browser
#   4. Chạy 01_constraints.cypher → 02 → 03 trong Browser
#      hoặc dùng cypher-shell (xem import_all.sh)

services:
  neo4j:
    image: neo4j:5.18-community
    container_name: kg_phones
    ports:
      - "7474:7474"   # Neo4j Browser
      - "7687:7687"   # Bolt protocol (driver / cypher-shell)
    environment:
      NEO4J_AUTH: neo4j/password123        # đổi password tuỳ ý
      NEO4J_PLUGINS: '["apoc"]'            # tuỳ chọn: bật APOC
      NEO4J_dbms_security_procedures_unrestricted: apoc.*
      NEO4J_server_memory_heap_initial__size: 512m
      NEO4J_server_memory_heap_max__size: 2g
    volumes:
      - ./csv:/var/lib/neo4j/import        # mount csv/ → import/
      - neo4j_data:/data
      - neo4j_logs:/logs
    restart: unless-stopped

volumes:
  neo4j_data:
  neo4j_logs:
